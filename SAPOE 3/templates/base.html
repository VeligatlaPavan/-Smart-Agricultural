<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="OptiCrop - Smart Agricultural Production Optimization Engine. An advanced Machine Learning tool to analyze soil nutrients and recommend the most suitable crops.">
    <title>{% block title %}OptiCrop - Smart Agricultural Production Optimization Engine{% endblock %}</title>
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌱</text></svg>">
    <!-- FontAwesome Icons CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <!-- Sticky Navigation Header -->
    <header>
        <div class="nav-container">
            <a href="{{ url_for('home') }}" class="logo">
                <i class="fa-solid fa-leaf"></i>
                <span>OptiCrop</span>
            </a>
            <ul class="nav-menu">
                <li class="nav-item {% if request.path == '/' %}active{% endif %}">
                    <a href="{{ url_for('home') }}"><i class="fa-solid fa-house"></i> Home</a>
                </li>
                <li class="nav-item {% if request.path == '/recommend' %}active{% endif %}">
                    <a href="{{ url_for('recommend') }}"><i class="fa-solid fa-magnifying-glass-chart"></i> Recommend Crop</a>
                </li>
                <li class="nav-item {% if request.path == '/about' %}active{% endif %}">
                    <a href="{{ url_for('about') }}"><i class="fa-solid fa-circle-info"></i> About</a>
                </li>
            </ul>
        </div>
    </header>

    <!-- Main Content Block -->
    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- Footer Area -->
    <footer>
        <div class="footer-content">
            <div class="footer-logo">
                <i class="fa-solid fa-leaf"></i>
                <span>OptiCrop - Agricultural Optimization Engine</span>
            </div>
            <div class="footer-text">
                &copy; 2026 OptiCrop. College Demo Project. Built with Python & Flask.
            </div>
        </div>
    </footer>

    <!-- Custom JS script -->
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
